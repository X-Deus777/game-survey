<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Steam Game Survey</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:20px;
display:flex;
justify-content:center;
}

.container{
width:900px;
max-width:100%;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.progress{
font-size:14px;
opacity:0.7;
}

/* NAVIGATION */

.game-nav{
display:flex;
overflow-x:auto;
gap:6px;
padding:8px 0;
margin-bottom:15px;
}

.game-nav button{
flex:0 0 auto;
padding:6px 10px;
border-radius:6px;
border:1px solid #333;
background:#111;
color:white;
font-size:12px;
cursor:pointer;
}

.game-nav button.active{
background:#22c55e;
}

/* VIDEO */

video{
width:100%;
border-radius:12px;
margin-bottom:20px;
background:black;
}

iframe{
width:100%;
height:520px;
border-radius:12px;
margin-bottom:20px;
border:none;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
margin-bottom:25px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:transform .25s, box-shadow .25s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 12px 30px rgba(0,0,0,0.8);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* RATING */

.rating{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
}

.rating button{
width:40px;
height:40px;
border-radius:8px;
border:1px solid #333;
background:#111;
color:white;
cursor:pointer;
}

.rating button.active{
background:#22c55e;
}

/* NEXT */

.next{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#22c55e;
cursor:pointer;
font-size:16px;
}

/* MOBILE */

@media (max-width:700px){

body{
padding:10px;
}

iframe{
height:260px;
}

video{
max-height:260px;
}

.gallery{
grid-template-columns:repeat(2,1fr);
gap:8px;
}

.rating button{
width:36px;
height:36px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2 id="title">Loading...</h2>
<div class="progress" id="progress"></div>
</div>

<div id="game-nav" class="game-nav"></div>

<div id="video"></div>

<div class="gallery" id="gallery"></div>

<div class="rating" id="rating"></div>

<button class="next" onclick="nextGame()">Следующая игра</button>

</div>

<div id="lightbox" class="lightbox">
<img id="lightbox-img">
</div>

<script>

/* GAME LIST */

const games = [
212480,209120,246900,389730,217200,1805570,976310,
1260320,1356040,1071870,620,435150,1426210,413150,
35700,268910,477160,960990,237110,1732920,41070,
489630,221040,359840,35720,640590,226840,204360,
247080,22230,319910,281920,373420,57680,1577120,
1567020,1313140,1281590,1097840,983970,972660,
914750,797410,728880,710920,690640,641990,471550,
374040,371140,341800,295790,275390,255070,41000
]

let index=0
let selected=null
let answers={}

/* RATING BUTTONS */

function createRating(){

const r=document.getElementById("rating")

for(let i=0;i<=10;i++){

const b=document.createElement("button")
b.innerText=i

b.onclick=()=>{

selected=i

document.querySelectorAll(".rating button")
.forEach(x=>x.classList.remove("active"))

b.classList.add("active")

}

r.appendChild(b)

}

}

/* NAVIGATION */

function createGameNav(){

const nav=document.getElementById("game-nav")

games.forEach((g,i)=>{

const b=document.createElement("button")

b.innerText=i+1

b.onclick=()=>{

index=i
loadGame()
updateNav()

}

nav.appendChild(b)

})

}

function updateNav(){

document.querySelectorAll("#game-nav button")
.forEach((b,i)=>{

b.classList.toggle("active",i===index)

})

}

/* LOAD GAME */

async function loadGame(){

const appid=games[index]

document.getElementById("progress").innerText =
(index+1)+" / "+games.length

updateNav()

const res=await fetch(`/game?appid=${appid}`)
const game=await res.json()

document.getElementById("title").innerText=game.title

const videoContainer=document.getElementById("video")
videoContainer.innerHTML=""

/* VIDEO */

if(game.video){

const video=document.createElement("video")

video.controls=true
video.autoplay=true
video.loop=true
video.src=game.video

videoContainer.appendChild(video)

}

else if(game.embed){

const iframe=document.createElement("iframe")

iframe.src=game.embed
iframe.allow="autoplay; fullscreen"

videoContainer.appendChild(iframe)

}

/* SCREENSHOTS */

const gallery=document.getElementById("gallery")
gallery.innerHTML=""

if(game.screenshots){

game.screenshots.forEach(src=>{

const img=document.createElement("img")

img.src=src
img.onclick=()=>openImage(src)

gallery.appendChild(img)

})

}

selected=null

document.querySelectorAll(".rating button")
.forEach(x=>x.classList.remove("active"))

}

/* LIGHTBOX */

const lightbox=document.getElementById("lightbox")
const lightboxImg=document.getElementById("lightbox-img")

function openImage(src){

lightbox.style.display="flex"
lightboxImg.src=src

}

lightbox.onclick=()=>{

lightbox.style.display="none"

}

/* NEXT GAME */

async function nextGame(){

if(selected===null){
alert("Поставь оценку")
return
}

const gameId=games[index]
const score=selected

answers[gameId]=score

/* SEND TO GOOGLE SHEETS */

try{

await fetch(
"https://script.google.com/macros/s/AKfycbxh2BlgebEKrA-HiCy5p7YWypnq7fxww2jvFAqYRLU_qF3scFqWUgqGLjDmZfOrbMwP/exec",
{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
game:gameId,
score:score
})
}
)

}catch(e){
console.log(e)
}

index++

if(index>=games.length){

localStorage.setItem("steamSurvey",JSON.stringify(answers))

alert("Опрос завершён")

return

}

loadGame()

}

/* INIT */

createRating()
createGameNav()
loadGame()

</script>

</body>
</html>
