<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Steam Game Survey</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
margin:0;
display:flex;
}

/* MAIN */

.main{
flex:1;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:900px;
max-width:100%;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.progress{
opacity:0.6;
font-size:14px;
}

/* VIDEO */

video{
width:100%;
border-radius:12px;
margin-bottom:20px;
}

iframe{
width:100%;
height:520px;
border-radius:12px;
margin-bottom:20px;
border:none;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
margin-bottom:25px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:transform .2s;
}

.gallery img:hover{
transform:scale(1.04);
}

/* RATING */

.rating{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
}

.rating button{
width:40px;
height:40px;
border-radius:8px;
border:1px solid #333;
background:#111;
color:white;
cursor:pointer;
}

.rating button.active{
background:#22c55e;
}

/* NEXT */

.next{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#22c55e;
cursor:pointer;
font-size:16px;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* SIDE NAV */

.side{
width:300px;
background:#0b0b0b;
border-left:1px solid #222;
overflow-y:auto;
transition:transform .3s;
}

.side.hidden{
transform:translateX(100%);
}

.side h3{
padding:15px;
margin:0;
border-bottom:1px solid #222;
}

.game-list{
display:flex;
flex-direction:column;
}

.game-list button{
text-align:left;
padding:10px 15px;
border:none;
border-bottom:1px solid #111;
background:#0b0b0b;
color:white;
cursor:pointer;
}

.game-list button:hover{
background:#111;
}

.game-list button.active{
background:#22c55e;
color:black;
}

/* TOGGLE */

.toggle{
position:fixed;
right:310px;
top:20px;
z-index:50;
background:#22c55e;
border:none;
padding:10px 12px;
border-radius:6px;
cursor:pointer;
}

/* MOBILE */

@media (max-width:900px){

.side{
position:fixed;
right:0;
top:0;
height:100%;
z-index:40;
}

.toggle{
right:20px;
}

.gallery{
grid-template-columns:repeat(2,1fr);
}

iframe{
height:260px;
}

}

</style>

</head>

<body>

<button class="toggle" onclick="toggleMenu()">Игры</button>

<div class="main">

<div class="container">

<div class="header">
<h2 id="title">Loading...</h2>
<div class="progress" id="progress"></div>
</div>

<div id="video"></div>

<div id="gallery" class="gallery"></div>

<div id="rating" class="rating"></div>

<button class="next" onclick="nextGame()">Следующая игра</button>

</div>

</div>

<div class="side hidden" id="side">

<h3>Игры</h3>

<div id="game-list" class="game-list"></div>

</div>

<div id="lightbox" class="lightbox">
<img id="lightbox-img">
</div>

<script>

/* GAME IDS */

const games=[
212480,209120,246900,389730,217200,1805570,976310,
1260320,1356040,1071870,620,435150,1426210,413150,
35700,268910,477160,960990,237110,1732920,41070,
489630,221040,359840,35720,640590,226840,204360,
247080,22230,319910,281920,373420,57680,1577120,
1567020,1313140,1281590,1097840,983970,972660,
914750,797410,728880,710920,690640,641990,471550,
374040,371140,341800,295790,275390,255070,41000
]

let index=0
let selected=null
let answers={}
let titles={}

/* RATING */

function createRating(){

const r=document.getElementById("rating")

for(let i=0;i<=10;i++){

const b=document.createElement("button")
b.innerText=i

b.onclick=()=>{

selected=i

document.querySelectorAll(".rating button")
.forEach(x=>x.classList.remove("active"))

b.classList.add("active")

}

r.appendChild(b)

}

}

/* MENU */

function toggleMenu(){

document.getElementById("side").classList.toggle("hidden")

}

/* GAME LIST */

function updateGameList(){

const list=document.getElementById("game-list")
list.innerHTML=""

games.forEach((g,i)=>{

const b=document.createElement("button")

b.innerText=titles[g]||("Game "+g)

b.classList.toggle("active",i===index)

b.onclick=()=>{

index=i
loadGame()

}

list.appendChild(b)

})

}

/* LOAD GAME */

async function loadGame(){

const id=games[index]

document.getElementById("progress").innerText=
(index+1)+" / "+games.length

const res=await fetch(`/game?appid=${id}`)
const game=await res.json()

titles[id]=game.title

document.getElementById("title").innerText=game.title

updateGameList()

/* VIDEO */

const videoContainer=document.getElementById("video")
videoContainer.innerHTML=""

if(game.video){

const v=document.createElement("video")

v.controls=true
v.autoplay=true
v.loop=true
v.src=game.video

videoContainer.appendChild(v)

}

else if(game.embed){

const iframe=document.createElement("iframe")

iframe.src=game.embed
iframe.allow="autoplay"

videoContainer.appendChild(iframe)

}

/* GALLERY */

const gallery=document.getElementById("gallery")
gallery.innerHTML=""

if(game.screenshots){

game.screenshots.forEach(src=>{

const img=document.createElement("img")

img.src=src
img.onclick=()=>openImage(src)

gallery.appendChild(img)

})

}

selected=null

document.querySelectorAll(".rating button")
.forEach(x=>x.classList.remove("active"))

}

/* LIGHTBOX */

const lightbox=document.getElementById("lightbox")
const lightboxImg=document.getElementById("lightbox-img")

function openImage(src){

lightbox.style.display="flex"
lightboxImg.src=src

}

lightbox.onclick=()=>lightbox.style.display="none"

/* NEXT */

async function nextGame(){

if(selected===null){

alert("Поставь оценку")
return

}

const id=games[index]
const score=selected

answers[id]=score

try{

await fetch(
"https://script.google.com/macros/s/AKfycbxh2BlgebEKrA-HiCy5p7YWypnq7fxww2jvFAqYRLU_qF3scFqWUgqGLjDmZfOrbMwP/exec",
{
method:"POST",
mode:"no-cors",
body:JSON.stringify({game:id,score:score})
})

}catch(e){}

index++

if(index>=games.length){

localStorage.setItem("steamSurvey",JSON.stringify(answers))

alert("Опрос завершён")

return

}

loadGame()

}

/* INIT */

createRating()
updateGameList()
loadGame()

</script>

</body>
</html>
